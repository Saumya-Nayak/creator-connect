<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="images/logo2.png" />
    <title>Reset Password - Creator Connect</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* ===== THEME VARIABLES ===== */
      body.light {
        --bg-gradient-start: #667eea;
        --bg-gradient-end: #764ba2;
        --container-bg: #ffffff;
        --text-primary: #333333;
        --text-secondary: #666666;
        --input-bg: #ffffff;
        --input-border: #dddddd;
        --input-focus: #e336cc;
        --password-toggle: #999999;
        --strength-bg: #f0f0f0;
        --requirements-bg: #f8f9fa;
        --shadow: rgba(0, 0, 0, 0.2);
      }

      body.dark {
        --bg-gradient-start: #1a1a2e;
        --bg-gradient-end: #16213e;
        --container-bg: #1f1f1f;
        --text-primary: #f1f1f1;
        --text-secondary: #bbbbbb;
        --input-bg: #2a2a2a;
        --input-border: #444444;
        --input-focus: #e336cc;
        --password-toggle: #bbbbbb;
        --strength-bg: #333333;
        --requirements-bg: #2a2a2a;
        --shadow: rgba(0, 0, 0, 0.6);
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(
          135deg,
          var(--bg-gradient-start) 0%,
          var(--bg-gradient-end) 100%
        );
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        transition: background 0.3s ease;
      }

      .reset-container {
        background: var(--container-bg);
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 10px 40px var(--shadow);
        max-width: 450px;
        width: 100%;
        animation: slideUp 0.5s ease;
        transition: background 0.3s ease;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .logo {
        text-align: center;
        margin-bottom: 30px;
      }

      .logo i {
        font-size: 48px;
        color: #e336cc;
        margin-bottom: 10px;
      }

      .logo h1 {
        color: var(--text-primary);
        font-size: 28px;
        margin-bottom: 8px;
        transition: color 0.3s ease;
      }

      .logo p {
        color: var(--text-secondary);
        font-size: 14px;
        transition: color 0.3s ease;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        color: var(--text-primary);
        font-weight: 500;
        font-size: 14px;
        transition: color 0.3s ease;
      }

      .password-input {
        position: relative;
      }

      .form-group input {
        width: 100%;
        padding: 14px;
        padding-right: 45px;
        border: 2px solid var(--input-border);
        border-radius: 8px;
        font-size: 15px;
        background: var(--input-bg);
        color: var(--text-primary);
        transition: all 0.3s ease;
      }

      .form-group input:focus {
        outline: none;
        border-color: var(--input-focus);
      }

      .password-toggle {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        color: var(--password-toggle);
        font-size: 18px;
        transition: color 0.3s;
      }

      .password-toggle:hover {
        color: #e336cc;
      }

      .password-strength {
        margin-top: 8px;
        font-size: 12px;
      }

      .strength-bar {
        height: 4px;
        background: var(--strength-bg);
        border-radius: 2px;
        margin-top: 5px;
        overflow: hidden;
        transition: background 0.3s ease;
      }

      .strength-bar-fill {
        height: 100%;
        width: 0%;
        transition: all 0.3s;
        border-radius: 2px;
      }

      .btn-reset {
        width: 100%;
        padding: 14px;
        background: #e336cc;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        margin-top: 10px;
      }

      .btn-reset:hover {
        background: #c32bb3;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(227, 54, 204, 0.3);
      }

      .btn-reset:disabled {
        background: #ccc;
        cursor: not-allowed;
        transform: none;
      }

      .message {
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 20px;
        font-size: 14px;
        display: none;
      }

      .message.success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
        display: block;
      }

      .message.error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
        display: block;
      }

      .back-to-login {
        text-align: center;
        margin-top: 20px;
      }

      .back-to-login a {
        color: #e336cc;
        text-decoration: none;
        font-weight: 500;
        transition: color 0.3s;
      }

      .back-to-login a:hover {
        color: #c32bb3;
      }

      .loading-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        justify-content: center;
        align-items: center;
        z-index: 1000;
      }

      .loading-overlay.active {
        display: flex;
      }

      .spinner {
        width: 50px;
        height: 50px;
        border: 5px solid #f3f3f3;
        border-top: 5px solid #e336cc;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .password-requirements {
        background: var(--requirements-bg);
        border-left: 4px solid #e336cc;
        padding: 12px;
        margin-top: 15px;
        border-radius: 4px;
        font-size: 13px;
        transition: background 0.3s ease;
      }

      .password-requirements h4 {
        margin-bottom: 8px;
        color: var(--text-primary);
        font-size: 14px;
        transition: color 0.3s ease;
      }

      .password-requirements ul {
        list-style: none;
        padding-left: 0;
      }

      .password-requirements li {
        padding: 4px 0;
        color: var(--text-secondary);
        transition: color 0.3s ease;
      }

      .password-requirements li i {
        margin-right: 8px;
        width: 16px;
      }

      /* ===== CUSTOM POPUP STYLES ===== */
      .popup-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        justify-content: center;
        align-items: center;
        z-index: 10000;
        animation: fadeIn 0.3s ease;
      }

      .popup-overlay.active {
        display: flex;
      }

      .popup-box {
        background: var(--container-bg);
        padding: 30px;
        border-radius: 12px;
        max-width: 400px;
        width: 90%;
        box-shadow: 0 10px 40px var(--shadow);
        animation: popupSlide 0.3s ease;
        transition: background 0.3s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      @keyframes popupSlide {
        from {
          opacity: 0;
          transform: translateY(-20px) scale(0.95);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .popup-header {
        display: flex;
        align-items: center;
        margin-bottom: 15px;
      }

      .popup-header i {
        font-size: 32px;
        margin-right: 15px;
      }

      .popup-header.error i {
        color: #dc3545;
      }

      .popup-header.success i {
        color: #28a745;
      }

      .popup-header.info i {
        color: #17a2b8;
      }

      .popup-title {
        font-size: 20px;
        font-weight: 600;
        color: var(--text-primary);
        transition: color 0.3s ease;
      }

      .popup-message {
        color: var(--text-secondary);
        font-size: 15px;
        line-height: 1.5;
        margin-bottom: 20px;
        transition: color 0.3s ease;
      }

      .popup-button {
        width: 100%;
        padding: 12px;
        background: #e336cc;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
      }

      .popup-button:hover {
        background: #c32bb3;
        transform: translateY(-2px);
      }

      @media (max-width: 480px) {
        .reset-container {
          padding: 30px 20px;
        }

        .popup-box {
          padding: 25px 20px;
        }
      }
    </style>
  </head>
  <body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
    </div>

    <!-- Custom Popup -->
    <div class="popup-overlay" id="customPopup">
      <div class="popup-box">
        <div class="popup-header" id="popupHeader">
          <i class="fas fa-exclamation-circle"></i>
          <div class="popup-title" id="popupTitle">Notification</div>
        </div>
        <div class="popup-message" id="popupMessage">This is a message</div>
        <button class="popup-button" onclick="closePopup()">OK</button>
      </div>
    </div>

    <div class="reset-container">
      <div class="logo">
        <i class="fas fa-lock"></i>
        <h1>Reset Password</h1>
        <p>Enter your new password below</p>
      </div>

      <div id="messageBox" class="message"></div>

      <form id="resetPasswordForm">
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <div class="password-input">
            <input
              type="password"
              id="newPassword"
              placeholder="Enter new password"
              required
              minlength="8"
              maxlength="50"
            />
            <i
              class="fas fa-eye password-toggle"
              onclick="togglePassword('newPassword')"
            ></i>
          </div>
          <div class="password-strength">
            <div class="strength-bar">
              <div class="strength-bar-fill" id="strengthBar"></div>
            </div>
            <small id="strengthText"></small>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <div class="password-input">
            <input
              type="password"
              id="confirmPassword"
              placeholder="Confirm new password"
              required
              minlength="8"
              maxlength="50"
            />
            <i
              class="fas fa-eye password-toggle"
              onclick="togglePassword('confirmPassword')"
            ></i>
          </div>
        </div>

        <div class="password-requirements">
          <h4>Password Requirements:</h4>
          <ul>
            <li>
              <i class="fas fa-check-circle" style="color: #28a745"></i> 8-50
              characters long
            </li>
            <li>
              <i class="fas fa-check-circle" style="color: #28a745"></i> At
              least one special character
            </li>
            <li>
              <i class="fas fa-check-circle" style="color: #28a745"></i> No
              spaces allowed
            </li>
          </ul>
        </div>

        <button type="submit" class="btn-reset" id="resetBtn">
          <i class="fas fa-check"></i> Reset Password
        </button>
      </form>

      <div class="back-to-login">
        <a href="login.html">
          <i class="fas fa-arrow-left"></i> Back to Login
        </a>
      </div>
    </div>

    <script src="js/reset-password.js"></script>
  </body>
</html>
