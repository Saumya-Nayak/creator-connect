<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Deals - Creator Connect</title>
    <link rel="icon" type="image/png" href="images/logo2.png" />
    <!-- SEO -->
    <meta
      name="description"
      content="Creator Connect — A platform connecting creators with their audience. Share, sell, and grow."
    />
    <meta
      name="keywords"
      content="creator, social media, connect, sell services, products"
    />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (for sharing on WhatsApp, Facebook etc) -->
    <meta property="og:title" content="Creator Connect" />
    <meta
      property="og:description"
      content="Connect with creators. Buy, sell, and grow together."
    />
    <meta
      property="og:url"
      content="https://creator-connect-production.up.railway.app"
    />
    <meta property="og:type" content="website" />
    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-6WRMM5YQPX"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-6WRMM5YQPX");
    </script>
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/header.css" />
    <link rel="stylesheet" href="css/sidebar.css" />
    <link rel="stylesheet" href="css/my-deals.css" />

    <style>
      /* Additional styles for rejection/cancellation reasons */
      .rejection-reason,
      .provider-message {
        margin-top: 12px;
        padding: 12px;
        background: rgba(220, 53, 69, 0.1);
        border-left: 3px solid #dc3545;
        border-radius: 6px;
        font-size: 0.9rem;
        color: var(--text-primary);
      }

      .provider-message {
        background: rgba(32, 201, 151, 0.1);
        border-left-color: #20c997;
      }

      .rejection-reason i,
      .provider-message i {
        margin-right: 6px;
        color: #dc3545;
      }

      .provider-message i {
        color: #20c997;
      }

      .rejection-reason strong,
      .provider-message strong {
        margin-right: 6px;
      }

      /* Fix clickable area for status items and type tabs */
      .status-item {
        cursor: pointer !important;
        user-select: none;
      }

      .status-item * {
        pointer-events: none;
      }

      .type-tab {
        cursor: pointer !important;
        user-select: none;
      }

      .type-tab * {
        pointer-events: none;
      }

      .role-toggle-btn {
        cursor: pointer !important;
        user-select: none;
      }

      .role-toggle-btn * {
        pointer-events: none;
      }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  </head>
  <body>
    <!-- Header -->
    <div id="headerContainer"></div>

    <!-- Main Layout -->
    <div class="main-layout">
      <!-- Sidebar -->
      <div id="sidebarContainer"></div>

      <!-- Main Content -->
      <main class="deals-content">
        <!-- Page Header -->
        <div class="deals-header">
          <div class="header-background">
            <div class="gradient-overlay"></div>
          </div>

          <div class="header-content">
            <div class="header-title">
              <i class="fas fa-handshake"></i>
              <div>
                <h1>My Deals</h1>
                <p class="header-subtitle">
                  Manage all your transactions in one place
                </p>
              </div>
            </div>

            <!-- Quick Stats -->
            <div class="quick-stats">
              <div class="stat-box">
                <i class="fas fa-shopping-cart"></i>
                <div>
                  <span class="stat-number" id="totalOrders">0</span>
                  <span class="stat-label">Total Orders</span>
                </div>
              </div>
              <div class="stat-box">
                <i class="fas fa-box-open"></i>
                <div>
                  <span class="stat-number" id="activeOrders">0</span>
                  <span class="stat-label">Active</span>
                </div>
              </div>
              <div class="stat-box">
                <i class="fas fa-check-circle"></i>
                <div>
                  <span class="stat-number" id="completedOrders">0</span>
                  <span class="stat-label">Completed</span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Main Content Area -->
        <div class="deals-main-content">
          <!-- Deals Container with Sidebar Filter -->
          <div class="deals-container">
            <!-- LEFT FILTER SIDEBAR -->
            <aside class="filter-section">
              <div class="filter-header">
                <h2><i class="fas fa-filter"></i> Filters</h2>
              </div>

              <!-- Role Toggle (As Buyer/Seller) -->
              <div class="filter-group">
                <label class="filter-label">View As</label>
                <div class="role-toggle">
                  <button
                    class="role-toggle-btn active"
                    data-role="buyer"
                    onclick="switchRole('buyer')"
                  >
                    <i class="fas fa-shopping-bag"></i>
                    <span>Buyer</span>
                    <span class="role-badge" id="buyerBadge">0</span>
                  </button>
                  <button
                    class="role-toggle-btn"
                    data-role="seller"
                    onclick="switchRole('seller')"
                  >
                    <i class="fas fa-store"></i>
                    <span>Seller</span>
                    <span class="role-badge" id="sellerBadge">0</span>
                  </button>
                </div>
              </div>

              <!-- Type Filter (All/Products/Services) -->
              <div class="filter-group">
                <label class="filter-label">Deal Type</label>
                <div class="type-filter-buttons" id="buyerTypeButtons">
                  <button
                    class="type-filter-btn active"
                    data-type="all"
                    onclick="filterByType('buyer', 'all')"
                  >
                    <i class="fas fa-th"></i>
                    <span>All</span>
                    <span class="type-count" id="buyerAllCount">0</span>
                  </button>
                  <button
                    class="type-filter-btn"
                    data-type="products"
                    onclick="filterByType('buyer', 'products')"
                  >
                    <i class="fas fa-box"></i>
                    <span>Products</span>
                    <span class="type-count" id="buyerProductCount">0</span>
                  </button>
                  <button
                    class="type-filter-btn"
                    data-type="services"
                    onclick="filterByType('buyer', 'services')"
                  >
                    <i class="fas fa-briefcase"></i>
                    <span>Services</span>
                    <span class="type-count" id="buyerServiceCount">0</span>
                  </button>
                </div>

                <!-- Seller Type Buttons (hidden initially) -->
                <div
                  class="type-filter-buttons"
                  id="sellerTypeButtons"
                  style="display: none"
                >
                  <button
                    class="type-filter-btn active"
                    data-type="all"
                    onclick="filterByType('seller', 'all')"
                  >
                    <i class="fas fa-th"></i>
                    <span>All</span>
                    <span class="type-count" id="sellerAllCount">0</span>
                  </button>
                  <button
                    class="type-filter-btn"
                    data-type="products"
                    onclick="filterByType('seller', 'products')"
                  >
                    <i class="fas fa-box"></i>
                    <span>Products</span>
                    <span class="type-count" id="sellerProductCount">0</span>
                  </button>
                  <button
                    class="type-filter-btn"
                    data-type="services"
                    onclick="filterByType('seller', 'services')"
                  >
                    <i class="fas fa-briefcase"></i>
                    <span>Services</span>
                    <span class="type-count" id="sellerServiceCount">0</span>
                  </button>
                </div>
              </div>

              <!-- Status Filter -->
              <div class="filter-group">
                <label class="filter-label">Status</label>
                <div class="status-list" id="buyerStatusFilter">
                  <!-- Will be populated by JS -->
                </div>

                <!-- Seller Status Filter (hidden initially) -->
                <div
                  class="status-list"
                  id="sellerStatusFilter"
                  style="display: none"
                >
                  <!-- Will be populated by JS -->
                </div>
              </div>
            </aside>

            <!-- MAIN CONTENT AREA -->
            <div class="main-content-area">
              <!-- View Toggle (Grid/List) -->
              <div class="view-controls">
                <h2 id="resultsTitle">All Deals</h2>
                <div class="view-toggle">
                  <button
                    class="view-toggle-btn active"
                    data-view="list"
                    onclick="toggleView('list')"
                    title="List View"
                  >
                    <i class="fas fa-list"></i>
                  </button>
                  <button
                    class="view-toggle-btn"
                    data-view="grid"
                    onclick="toggleView('grid')"
                    title="Grid View"
                  >
                    <i class="fas fa-th"></i>
                  </button>
                </div>
              </div>

              <!-- Deals Section -->
              <div class="deals-section active" id="buyerSection">
                <div class="deals-grid view-list" id="buyerDealsGrid">
                  <!-- Loading skeleton -->
                  <div class="loading-skeleton">
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                  </div>
                </div>

                <!-- Empty State -->
                <div
                  class="empty-state"
                  id="buyerEmptyState"
                  style="display: none"
                >
                  <i class="fas fa-shopping-cart"></i>
                  <h3>No orders yet</h3>
                  <p>
                    Start exploring and purchase amazing products or services!
                  </p>
                  <button
                    class="btn btn-primary"
                    onclick="window.location.href='explore.html'"
                  >
                    <i class="fas fa-compass"></i> Explore Now
                  </button>
                </div>
              </div>

              <!-- Seller Section -->
              <div class="deals-section" id="sellerSection">
                <div class="deals-grid view-list" id="sellerDealsGrid">
                  <!-- Loading skeleton -->
                  <div class="loading-skeleton">
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                  </div>
                </div>

                <!-- Empty State -->
                <div
                  class="empty-state"
                  id="sellerEmptyState"
                  style="display: none"
                >
                  <i class="fas fa-store-slash"></i>
                  <h3>No sales yet</h3>
                  <p>
                    Start selling your products or services to receive orders!
                  </p>
                  <button
                    class="btn btn-primary"
                    onclick="window.location.href='upload.html'"
                  >
                    <i class="fas fa-plus"></i> Create Listing
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Modal -->
    <div class="modal" id="actionModal">
      <div class="modal-overlay" onclick="closeModal()"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="modalTitle">Action</h3>
          <button class="modal-close" onclick="closeModal()">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="modal-body" id="modalBody">
          <!-- Dynamic content -->
        </div>
        <div class="modal-footer" id="modalFooter">
          <!-- Dynamic buttons -->
        </div>
      </div>
    </div>

    <!-- Post Detail Modal (iframe) -->
    <div class="post-detail-modal" id="postDetailModal">
      <div class="post-detail-modal-overlay" onclick="closePostDetailModal()">
        <div
          class="post-detail-modal-content"
          onclick="event.stopPropagation()"
        >
          <button
            class="modal-close-btn"
            onclick="closePostDetailModal()"
            title="Close"
          >
            <i class="fas fa-times"></i>
          </button>
          <iframe src="" frameborder="0" id="postDetailIframe"></iframe>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="js/my-deals.js"></script>
  </body>
</html>
