<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="images/logo2.png" />
    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-6WRMM5YQPX"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-6WRMM5YQPX");
    </script>
    <title>Creator Connect - Home</title>
    <link rel="stylesheet" href="css/header.css" />
    <link rel="stylesheet" href="css/sidebar.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/payment-modal.css" />
    <meta
      name="google-site-verification"
      content="1dyBZlv-DbAB43AAK2G1NdUIr8EMhHL5N6lWHQQe_28"
    />
    <!-- SEO -->
    <meta
      name="description"
      content="Creator Connect — A platform connecting creators with their audience. Share, sell, and grow."
    />
    <meta
      name="keywords"
      content="creator, social media, connect, sell services, products"
    />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (for sharing on WhatsApp, Facebook etc) -->
    <meta property="og:title" content="Creator Connect" />
    <meta
      property="og:description"
      content="Connect with creators. Buy, sell, and grow together."
    />
    <meta
      property="og:url"
      content="https://creator-connect-production.up.railway.app"
    />
    <meta property="og:type" content="website" />
  </head>
  <body>
    <!-- Preloader -->
    <div id="preloader">
      <div class="preloader-content">
        <img
          src="images/logo2.png"
          alt="Creator Connect Logo"
          class="preloader-logo"
        />
        <h1 class="preloader-title">Creator Connect</h1>
      </div>
    </div>

    <!-- Header -->
    <div id="header"></div>

    <!-- Sidebar -->
    <div id="sidebar"></div>

    <!-- Main Content (will be loaded dynamically) -->
    <main id="main-content"></main>
    <!-- Load home.js (which handles loading home-content.html and home-content.js) -->
    <script src="js/home.js"></script>
    <script src="js/group-notification-patch.js"></script>
    <!-- Preloader CSS -->
    <style>
      #preloader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #e60aea, #e336cc);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10000;
        opacity: 1;
        transition: opacity 0.5s ease;
      }

      #preloader.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .preloader-content {
        text-align: center;
        color: white;
      }

      .preloader-logo {
        width: 100px;
        height: 100px;
        margin-bottom: 20px;
        animation: bounce 2s infinite;
      }

      .preloader-title {
        font-size: 2rem;
        font-weight: 800;
        letter-spacing: 1px;
        animation: pulse 2s infinite;
      }

      @keyframes bounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-20px);
        }
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.7;
        }
      }
    </style>

    <!-- Preloader handler -->
    <script>
      // Hide preloader when page fully loads
      window.addEventListener("load", () => {
        const preloader = document.getElementById("preloader");
        if (preloader) {
          preloader.style.opacity = "0";
          setTimeout(() => {
            preloader.style.display = "none";
          }, 500);
        }
      });

      // Also hide after 3 seconds if page doesn't load
      setTimeout(() => {
        const preloader = document.getElementById("preloader");
        if (preloader && preloader.style.display !== "none") {
          preloader.style.opacity = "0";
          setTimeout(() => {
            preloader.style.display = "none";
          }, 500);
        }
      }, 3000);
    </script>
  </body>
</html>
