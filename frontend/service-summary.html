<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Service Booking Summary - Creator Connect</title>
    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-6WRMM5YQPX"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-6WRMM5YQPX");
    </script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/booking-summary-styles.css" />
    <style>
      /* Theme Variables */
      :root {
        --bg-primary: #ffffff;
        --bg-secondary: #f8f9fa;
        --text-primary: #1a1a1a;
        --text-secondary: #6c757d;
        --border-color: #dee2e6;
        --card-bg: #ffffff;
        --primary-purple: #e60aea;
      }

      [data-theme="dark"] {
        --bg-primary: #1a1a1a;
        --bg-secondary: #2d2d2d;
        --text-primary: #ffffff;
        --text-secondary: #b0b0b0;
        --border-color: #3d3d3d;
        --card-bg: #2d2d2d;
        --primary-purple: #e60aea;
      }

      body {
        background: transparent !important;
        color: var(--text-primary);
        margin: 0;
        padding: 20px;
      }

      .summary-container {
        background: transparent;
        max-width: 1400px;
        margin: 0 auto;
      }

      /* Horizontal Layout */
      .summary-content {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 30px;
      }

      .left-column {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .right-column {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .summary-header {
        background: var(--card-bg);
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        border: 1px solid var(--border-color);
      }

      .service-image-container {
        position: relative;
        width: 100%;
        height: 250px;
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 15px;
      }

      .service-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .service-title {
        font-size: 1.4rem;
        font-weight: 600;
        margin-bottom: 12px;
        color: var(--text-primary);
      }

      .provider-info {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 2px;
        background: var(--bg-secondary);
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-bottom: 12px;
      }

      .provider-info:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(230, 10, 234, 0.2);
      }

      .provider-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid var(--primary-purple);
      }

      .provider-name {
        font-weight: 600;
        font-size: 0.95rem;
        color: var(--text-primary);
      }

      .provider-username {
        font-size: 0.85rem;
        color: var(--text-secondary);
      }

      .service-meta {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 10px;
      }

      .meta-item {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.85rem;
        color: var(--text-secondary);
        padding: 6px 10px;
        background: var(--bg-secondary);
        border-radius: 8px;
      }

      .section {
        background: var(--card-bg);
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        border: 1px solid var(--border-color);
      }

      .section-title {
        color: var(--text-primary);
        font-size: 1.2rem;
        margin-bottom: 15px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .service-description {
        color: var(--text-secondary);
        line-height: 1.5;
        font-size: 0.9rem;
        max-height: 150px;
        overflow-y: auto;
      }

      .pricing-card {
        background: var(--bg-secondary);
        border-radius: 12px;
        padding: 18px;
      }

      .price-row {
        display: flex;
        justify-content: space-between;
        padding: 10px 0;
        color: var(--text-primary);
        font-size: 0.95rem;
      }

      .form-group {
        margin-bottom: 15px;
      }

      .form-group label {
        color: var(--text-primary);
        display: block;
        margin-bottom: 6px;
        font-weight: 500;
        font-size: 0.9rem;
      }

      .form-group input,
      .form-group textarea,
      .form-group select {
        background: var(--bg-secondary);
        color: var(--text-primary);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 10px;
        width: 100%;
        font-size: 0.9rem;
      }

      .action-buttons {
        grid-column: 1 / -1;
        display: flex;
        gap: 15px;
        justify-content: flex-end;
        padding: 15px 0;
      }

      .btn-cancel,
      .btn-book {
        padding: 12px 24px;
        border-radius: 10px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .btn-cancel {
        background: var(--bg-secondary);
        color: var(--text-primary);
        border: 1px solid var(--border-color);
      }

      .btn-book {
        background: var(--primary-purple);
        color: white;
        border: none;
      }

      .features-list {
        margin: 10px 0;
        padding-left: 20px;
        font-size: 0.85rem;
      }

      .features-list li {
        margin-bottom: 6px;
      }

      .char-counter {
        font-size: 0.8rem;
        color: var(--text-secondary);
      }

      @media (max-width: 1024px) {
        .summary-content {
          grid-template-columns: 1fr;
        }

        .action-buttons {
          justify-content: stretch;
        }

        .action-buttons button {
          flex: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="summary-container">
      <!-- Loading State -->
      <div class="loading-state" id="loadingState">
        <div class="loader"></div>
        <p>Loading service details...</p>
      </div>

      <!-- Error State -->
      <div class="error-state" id="errorState" style="display: none">
        <i class="fas fa-exclamation-circle"></i>
        <h3>Failed to load service</h3>
        <p id="errorMessage"></p>
        <button class="btn-retry" onclick="loadServiceDetails()">
          <i class="fas fa-redo"></i> Retry
        </button>
      </div>

      <!-- Main Content -->
      <div class="summary-content" id="summaryContent" style="display: none">
        <!-- LEFT COLUMN -->
        <div class="left-column">
          <!-- Header Section -->
          <div class="summary-header">
            <div class="service-image-container">
              <img
                src=""
                alt="Service"
                id="serviceImage"
                class="service-image"
              />
              <video
                id="serviceVideo"
                class="service-image"
                muted
                loop
                playsinline
                autoplay
                style="display: none"
              ></video>
              <button
                id="serviceVideoMuteBtn"
                onclick="toggleSummaryVideoMute('serviceVideo','serviceVideoMuteBtn')"
                style="
                  display: none;
                  position: absolute;
                  bottom: 10px;
                  right: 10px;
                  background: rgba(0, 0, 0, 0.55);
                  color: white;
                  border: none;
                  border-radius: 50%;
                  width: 34px;
                  height: 34px;
                  font-size: 0.85rem;
                  cursor: pointer;
                  align-items: center;
                  justify-content: center;
                  z-index: 5;
                "
              >
                <i class="fas fa-volume-mute"></i>
              </button>
              <div class="service-badge">
                <i class="fas fa-briefcase"></i>
                <span>Service</span>
              </div>
            </div>

            <h1 class="service-title" id="serviceTitle"></h1>

            <div
              class="provider-info"
              id="providerInfo"
              onclick="navigateToProfile()"
            >
              <img
                src=""
                alt="Provider"
                id="providerAvatar"
                class="provider-avatar"
              />
              <div class="provider-details">
                <div class="provider-name" id="providerName"></div>
                <div class="provider-username" id="providerUsername"></div>
              </div>
            </div>

            <div class="service-meta">
              <div class="meta-item">
                <i class="fas fa-clock"></i>
                <span id="serviceDuration"></span>
              </div>
              <div class="meta-item">
                <i class="fas fa-truck"></i>
                <span id="deliveryTime"></span>
              </div>
              <div class="meta-item" id="revisionsInfo" style="display: none">
                <i class="fas fa-redo"></i>
                <span id="revisions"></span>
              </div>
            </div>
          </div>

          <!-- Description Section -->
          <div class="section">
            <h2 class="section-title">
              <i class="fas fa-align-left"></i>
              Description
            </h2>
            <p class="service-description" id="serviceDescription"></p>

            <div
              class="service-features"
              id="serviceFeaturesContainer"
              style="display: none"
            >
              <h3
                style="font-size: 0.95rem; margin-top: 12px; margin-bottom: 8px"
              >
                What's Included:
              </h3>
              <ul class="features-list" id="featuresList"></ul>
            </div>
          </div>

          <!-- Pricing Section -->
          <div class="section pricing-section">
            <h2 class="section-title">
              <i class="fas fa-tag"></i>
              Pricing
            </h2>

            <div class="pricing-card">
              <div class="price-row">
                <span>Service Fee</span>
                <span class="price" id="basePrice"></span>
              </div>
              <div class="price-divider"></div>
              <div
                class="price-row total"
                style="font-weight: 600; font-size: 1.1rem"
              >
                <span>Total Amount</span>
                <span class="total-price" id="totalPrice"></span>
              </div>
            </div>
          </div>
        </div>

        <!-- RIGHT COLUMN -->
        <div class="right-column">
          <!-- Booking Form Section -->
          <div class="section booking-form-section">
            <h2 class="section-title">
              <i class="fas fa-calendar-check"></i>
              Booking Details
            </h2>

            <form id="bookingForm" class="booking-form">
              <!-- Start Date -->
              <div class="form-group">
                <label for="startDate">
                  <i class="fas fa-calendar"></i>
                  Preferred Start Date *
                </label>
                <input
                  type="date"
                  id="startDate"
                  name="startDate"
                  required
                  min=""
                />
              </div>

              <!-- Start Time -->
              <div class="form-group" id="timeGroup">
                <label for="startTime">
                  <i class="fas fa-clock"></i>
                  Preferred Time
                </label>
                <input type="time" id="startTime" name="startTime" />
              </div>

              <!-- Requirements -->
              <div class="form-group">
                <label for="requirements">
                  <i class="fas fa-file-alt"></i>
                  Project Requirements *
                </label>
                <textarea
                  id="requirements"
                  name="requirements"
                  rows="5"
                  placeholder="Describe your project in detail..."
                  required
                  minlength="20"
                ></textarea>
                <small class="char-counter">
                  <span id="charCount">0</span>/500 characters
                </small>
              </div>

              <!-- Contact Method -->
              <div class="form-group">
                <label for="contactMethod">
                  <i class="fas fa-phone"></i>
                  Preferred Contact Method *
                </label>
                <select id="contactMethod" name="contactMethod" required>
                  <option value="email">Email</option>
                  <option value="phone">Phone</option>
                  <option value="whatsapp">WhatsApp</option>
                </select>
              </div>

              <!-- Contact Info -->
              <div class="form-group">
                <label for="contactInfo">
                  <i class="fas fa-address-book"></i>
                  Your Contact *
                </label>
                <input
                  type="text"
                  id="contactInfo"
                  name="contactInfo"
                  placeholder="Enter your email or phone"
                  required
                />
              </div>

              <!-- Additional Notes -->
              <div class="form-group">
                <label for="additionalNotes">
                  <i class="fas fa-sticky-note"></i>
                  Additional Notes (Optional)
                </label>
                <textarea
                  id="additionalNotes"
                  name="additionalNotes"
                  rows="2"
                  placeholder="Any other information..."
                ></textarea>
              </div>
            </form>
          </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
          <button class="btn-cancel" onclick="closeSummary()">
            <i class="fas fa-times"></i>
            Cancel
          </button>
          <button class="btn-book" id="bookNowBtn" onclick="submitBooking()">
            <i class="fas fa-calendar-check"></i>
            <span>Send Booking Request</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
      <i class="fas fa-check-circle"></i>
      <span id="toastMessage"></span>
    </div>

    <script src="js/service-summary.js"></script>
    <script>
      // Apply theme on load
      function applyTheme() {
        const theme = localStorage.getItem("theme") || "light";
        document.documentElement.setAttribute("data-theme", theme);
      }

      // Listen for theme changes from parent
      window.addEventListener("message", (event) => {
        if (event.data.action === "themeChanged") {
          document.documentElement.setAttribute("data-theme", event.data.theme);
        }
      });

      // Apply theme immediately
      applyTheme();
    </script>
  </body>
</html>
